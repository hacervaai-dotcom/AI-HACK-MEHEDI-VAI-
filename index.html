/* --- লগইন সেকশন --- */
.fw-title{font-size:9px;color:#aaa;letter-spacing:1px;margin-bottom:7px;}

#fw-loginSection input{
    width:100%;
    padding:6px 8px;
    border:1px solid #7b2fff;
    border-radius:7px;
    background:rgba(0,0,0,0.55);
    color:white;
    font-size:12px;
    text-align:center;
    margin-bottom:4px;
}
#fw-loginSection input::placeholder{color:#666;}
#fw-msg{font-size:10px;color:#ff4d6d;min-height:13px;margin-bottom:3px;}

.fw-btn{
    display:block;
    width:100%;
    margin-top:5px;
    padding:7px 0;
    border:none;
    border-radius:7px;
    font-size:11px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    text-decoration:none;

<script>
const PASSWORD = "@";
let countdown=30, started=false, lastType="", history=[];

/* ── Period নাম্বার: hgnice সার্ভারের সাথে মেলানোর জন্য ──
   hgnice এর period format: YYYYMMDDHHmmss + 3-digit seq
   প্রতি ৩০ সেকেন্ডে একটি নতুন period আসে।
   আমরা current UTC+8 time থেকে calculate করব।            */

function getServerTime(){
    // UTC+8 (হাজিনাইস সার্ভার টাইমজোন ধরা হচ্ছে)
    const now = new Date();
    const utc8 = new Date(now.getTime() + (8 * 60 * 60 * 1000));
    return utc8;
}

function calcPeriod(){
    const t = getServerTime();
    const Y  = t.getUTCFullYear();
    const M  = String(t.getUTCMonth()+1).padStart(2,'0');
    const D  = String(t.getUTCDate()).padStart(2,'0');
    const H  = String(t.getUTCHours()).padStart(2,'0');
    const mi = String(t.getUTCMinutes()).padStart(2,'0');
    const S  = t.getUTCSeconds();
    // প্রতি ৩০ সেকেন্ডে একটি round, দিনে শুরু থেকে গণনা
    const totalSec = t.getUTCHours()*3600 + t.getUTCMinutes()*60 + S;
    const seq = Math.floor(totalSec/30) + 1;
    const seqStr = String(seq).padStart(3,'0');
    return `${Y}${M}${D}${seqStr}`;
}

function calcCountdown(){
    const t = getServerTime();
    const S = t.getUTCSeconds();
    // কোন ৩০s slot এ আছি
    const rem = 30 - (S % 30);
    return rem;
}

function pad2(n){ return String(n).padStart(2,'0'); }

/* LOGIN */
function fwLogin(){
    const pass = document.getElementById("fw-password").value;
    const msg  = document.getElementById("fw-msg");
    if(pass === PASSWORD){
        document.getElementById("fw-loginSection").style.display="none";
        document.getElementById("fw-aiSection").style.display="block";
        if(!started){ started=true; startSystem(); }
    } else {
        msg.innerText="❌ তোর মেহেদী বাপের কাছে পাসওয়ার্ড নে শালা!";
    }
}
document.getElementById("fw-password").addEventListener("keydown",e=>{if(e.key==="Enter")fwLogin();});

function logout(){
    document.getElementById("fw-aiSection").style.display="none";
    document.getElementById("fw-loginSection").style.display="block";
}

/* WEBSITE */
function openWebsite(){
    document.getElementById("siteFrame").src="https://hgnice.bet/#/register?invitationCode=531211974484";
    document.getElementById("iframeOverlay").style.display="block";
}
function closeWebsite(){
    document.getElementById("iframeOverlay").style.display="none";
    document.getElementById("siteFrame").src="";
}

/* DRAGGABLE */
(function(){
    const el=document.getElementById("floatWidget");
    let drag=false,sx,sy,ox,oy;
    el.addEventListener("mousedown",e=>{drag=true;sx=e.clientX;sy=e.clientY;ox=el.offsetLeft;oy=el.offsetTop;el.style.right="auto";el.style.bottom="auto";});
    document.addEventListener("mousemove",e=>{if(!drag)return;el.style.left=(ox+e.clientX-sx)+"px";el.style.top=(oy+e.clientY-sy)+"px";});
    document.addEventListener("mouseup",()=>drag=false);
    el.addEventListener("touchstart",e=>{drag=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY;ox=el.offsetLeft;oy=el.offsetTop;el.style.right="auto";el.style.bottom="auto";},{passive:true});
    document.addEventListener("touchmove",e=>{if(!drag)return;el.style.left=(ox+e.touches[0].clientX-sx)+"px";el.style.top=(oy+e.touches[0].clientY-sy)+"px";},{passive:true});
    document.addEventListener("touchend",()=>drag=false);
})();

/* HELPERS */
function getType(){ return Math.random()<0.5?"BIG":"SMALL"; }
function getNumbers(type){
    let arr=type==="BIG"?[9,0,5,8]:[0,9,2,1,4,7];
    return arr.sort(()=>Math.random()-0.5).slice(0,2);
}

/* START */
function startSystem(){
    update();
    setInterval(tick, 1000);
}

let lastPeriod="";

function tick(){
    const cd = calcCountdown();
    document.getElementById("fw-timerBox").innerText = "00:"+pad2(cd);
    const period = calcPeriod();
    if(period !== lastPeriod){
        lastPeriod = period;
        update();
    }
}

function update(){
    const period = calcPeriod();
    lastPeriod = period;

    let type=getType();
    if(type===lastType) type=type==="BIG"?"SMALL":"BIG";
    lastType=type;
    const nums=getNumbers(type);
    const num1=nums[0];

    document.getElementById("fw-periodVal").innerText=period;

    const resEl=document.getElementById("fw-result");
    resEl.innerText=type;
    resEl.style.color=type==="BIG"?"#00e5ff":"#ff4d6d";

    const badge=document.getElementById("fw-badge");
    badge.innerText=type==="BIG"?"GREEN":"RED";
    badge.style.background=type==="BIG"?"#00c896":"#ff4d6d";

    document.getElementById("fw-circleNum").innerText=num1;
    document.getElementById("fw-nums").innerText=nums.join(" / ");

    document.getElementById("fw-trend").innerText=type;
    document.getElementById("fw-suggest").innerText=type;

    history.unshift({period:period.slice(-3), type, num:num1});
    if(history.length>3) history.pop();
    const hEl=document.getElementById("fw-historyList");
    hEl.innerHTML=history.map(h=>
        `<div class="fw-hist-item"><span class="fw-hist-num">#${h.period}</span><span class="${h.type==="BIG"?"fw-hist-big":"fw-hist-small"}">${h.type==="BIG"?"B":"S"}(${h.num})</span></div>`
    ).join("");
}
</script>
