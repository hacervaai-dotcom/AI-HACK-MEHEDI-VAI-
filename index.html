<script>
        // Initialize Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Load or initialize persistent data
        let userBalance = parseFloat(localStorage.getItem('hm_balance')) || 0.00; 
        let referCount = parseInt(localStorage.getItem('hm_total_refers')) || 0;
        let activeReferCount = parseInt(localStorage.getItem('hm_active_refers')) || 0;

        // Fetch Telegram User Data if available
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('user-id').innerText = tg.initDataUnsafe.user.id;
            document.getElementById('refer-link-box').value = "https://t.me/hm_earnbd_bot/earn?startapp=" + tg.initDataUnsafe.user.id;
        } else {
            document.getElementById('refer-link-box').value = "https://t.me/hm_earnbd_bot/earn?startapp=7593775";
        }

        // Initialize UI Elements state on load
        window.addEventListener('DOMContentLoaded', () => {
            updateAllBalances();
            restoreTaskStates();
        });

        // Global State Synchronizer
        function updateAllBalances() {
            let formatted = userBalance.toFixed(2);
            document.getElementById('home-balance').innerText = formatted;
            document.getElementById('home-withdraw').innerText = formatted;
            document.getElementById('mine-balance').innerText = formatted;
            document.getElementById('total-earned').innerText = "৳" + formatted;
            
            document.getElementById('total-refers').innerText = referCount;
            document.getElementById('active-refers').innerText = activeReferCount;
            
            let salaryBtn = document.getElementById('salary-btn');
            salaryBtn.innerText = `Claim Salary (${activeReferCount}/25)`;
            if(activeReferCount >= 25) {
                salaryBtn.style.background = "#f59e0b";
                salaryBtn.style.color = "#000";
                salaryBtn.disabled = false;
            } else {
                salaryBtn.style.background = "#1e293b";
                salaryBtn.style.color = "#64748b";
                salaryBtn.disabled = true;
            }

            localStorage.setItem('hm_balance', userBalance);
            localStorage.setItem('hm_total_refers', referCount);
            localStorage.setItem('hm_active_refers', activeReferCount);
        }

        // Navigation Page Switcher
        function switchPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // Deactivate all navbar items
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            // Activate targeting page
            const targetPage = document.getElementById(`${pageId}-page`);
            const targetNav = document.getElementById(`nav-${pageId}`);
            
            if (targetPage) targetPage.classList.add('active');
            if (targetNav) targetNav.classList.add('active');

            // Dynamic header title management
            const headerTitle = document.getElementById('header-title');
            if(pageId === 'home') headerTitle.innerText = "HM Earn BD";
            else if(pageId === 'tasks') headerTitle.innerText = "Task Panel";
            else if(pageId === 'packages') headerTitle.innerText = "Investment Packages";
            else if(pageId === 'mine') headerTitle.innerText = "My Profile";
            
            // Scroll back to top on switch
            window.scrollTo(0, 0);
        }

        // Modal Layer Management
        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Earn Task Executor
        function runLinkTask(url, buttonId, reward) {
            // Open external target link securely
            if (tg.openLink) {
                tg.openLink(url);
            } else {
                window.open(url, '_blank');
            }

            const btn = document.getElementById(buttonId);
            btn.innerText = "Checking...";
            btn.disabled = true;

            // Simple claim timeout sequence mimicking verification backend
            setTimeout(() => {
                userBalance += parseFloat(reward);
                btn.innerText = "Completed";
                btn.style.background = "#1e293b";
                btn.style.color = "#64748b";
                
                // Track task completion state in storage
                localStorage.setItem(`task_status_${buttonId}`, 'done');
                updateAllBalances();
                
                if(tg.showAlert) {
                    tg.showAlert(`🎉 অভিনন্দন! আপনি সফলভাবে ৳${reward.toFixed(2)} অর্জন করেছেন।`);
                } else {
                    alert(`🎉 অভিনন্দন! আপনি সফলভাবে ৳${reward.toFixed(2)} অর্জন করেছেন।`);
                }
            }, 4000);
        }

        function restoreTaskStates() {
            const taskButtons = ['task1-btn', 'task2-btn', 'task3-btn', 'task4-btn'];
            taskButtons.forEach(btnId => {
                if(localStorage.getItem(`task_status_${btnId}`) === 'done') {
                    const btn = document.getElementById(btnId);
                    if(btn) {
                        btn.innerText = "Completed";
                        btn.style.background = "#1e293b";
                        btn.style.color = "#64748b";
                        btn.disabled = true;
                    }
                }
            });
        }

        // Package Order Gateway
        function openPackageDeposit(price) {
            openModal('topup-modal');
            document.getElementById('topup-amount').value = price;
            if(tg.showAlert) {
                tg.showAlert(`প্যাকেজটি কেনার জন্য নিচের দেওয়া নাম্বারে ৳${price} সেন্ড মানি করে TrxID সাবমিট করুন।`);
            }
        }

        // Submissions & Requests Processing
        function submitTopUp() {
            const amount = document.getElementById('topup-amount').value;
            const trxid = document.getElementById('topup-trxid').value;

            if(!amount || !trxid) {
                if(tg.showAlert) tg.showAlert("⚠️ দয়া করে সব তথ্য সঠিক ভাবে পূরণ করুন।");
                else alert("⚠️ দয়া করে সব তথ্য সঠিক ভাবে পূরণ করুন।");
                return;
            }

            if(tg.showAlert) {
                tg.showAlert("✅ আপনার পেমেন্ট রিকোয়েস্টটি জমা হয়েছে! ২৪ ঘণ্টার মধ্যে যাচাই করে ব্যালেন্স যোগ করা হবে।");
            } else {
                alert("✅ আপনার পেমেন্ট রিকোয়েস্টটি জমা হয়েছে! ২৪ ঘণ্টার মধ্যে যাচাই করে ব্যালেন্স যোগ করা হবে।");
            }
            
            // Clear fields and drop overlay
            document.getElementById('topup-amount').value = '';
            document.getElementById('topup-trxid').value = '';
            closeModal('topup-modal');
        }

        function submitWithdraw() {
            const method = document.getElementById('withdraw-method').value;
            const number = document.getElementById('withdraw-number').value;
            const amount = parseFloat(document.getElementById('withdraw-amount').value);

            if(!number || !amount) {
                alert("⚠️ সব তথ্য পূরণ করুন।");
                return;
            }

            if(amount < 100 || amount > 10000) {
                alert("⚠️ সর্বনিম্ন উত্তোলন ৳১০০ এবং সর্বোচ্চ ৳১০,০০০।");
                return;
            }

            if(amount > userBalance) {
                alert("❌ আপনার অ্যাকাউন্টে পর্যাপ্ত ব্যালেন্স নেই।");
                return;
            }

            // Deduct system values inside state engine
            userBalance -= amount;
            updateAllBalances();
            closeModal('withdraw-modal');

            // Flush inputs
            document.getElementById('withdraw-number').value = '';
            document.getElementById('withdraw-amount').value = '';

            if(tg.showAlert) {
                tg.showAlert(`✅ ৳${amount.toFixed(2)} উত্তোলনের রিকোয়েস্ট সফল হয়েছে। ১২-২৪ ঘণ্টার মধ্যে আপনার ${method} নম্বরে পেমেন্ট পেয়ে যাবেন।`);
            } else {
                alert(`✅ ৳${amount.toFixed(2)} উত্তোলনের রিকোয়েস্ট সফল হয়েছে। ১২-২৪ ঘণ্টার মধ্যে আপনার ${method} নম্বরে পেমেন্ট পেয়ে যাবেন।`);
            }
        }

        // Clipboard Action
        function copyReferLink() {
            const linkBox = document.getElementById('refer-link-box');
            linkBox.select();
            linkBox.setSelectionRange(0, 99999); // Mobile compliance support

            try {
                navigator.clipboard.writeText(linkBox.value);
                if(tg.showAlert) tg.showAlert("📋 লিংকটি কপি করা হয়েছে! বন্ধুদের সাথে শেয়ার করুন।");
                else alert("📋 লিংকটি কপি করা হয়েছে! বন্ধুদের সাথে শেয়ার করুন।");
            } catch (err) {
                // Fallback implementation
                alert("লিংকটি সিলেক্ট করুন এবং ম্যানুয়ালি কপি করুন।");
            }
        }

        // Salary Reward Program 
        function claimSalary() {
            if(activeReferCount >= 25) {
                userBalance += 500.00;
                activeReferCount -= 25; // Consume required active counters
                updateAllBalances();
                alert("🎉 অভিনন্দন! আপনার এই মাসের ফিক্সড সেলারি ৳৫০০ অ্যাকাউন্টে যোগ করা হয়েছে।");
            }
        }
    </script>
</body>
    </html>
